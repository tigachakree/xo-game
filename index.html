<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1 class="title">Tic-Tac-Toe</h1>
        <p class="subtitle">Select Mode to Start</p> 
      </header>

      <!-- หน้าจอเลือกโหมด -->
      <section id="menu" class="card">
        <div class="menu">
          <button id="btnPvp" class="btn primary" type="button">Two Players</button>
          <button id="btnBot" class="btn" type="button">Play vs Bot</button>
        </div>
        <p class="hint">
          Rules: Get 3 in a row to win
        </p>
      </section>

      <!-- หน้าจอเกม -->
      <section id="game" class="card hidden" aria-live="polite">
        <div class="topbar">
          <div>
            <div class="mode" id="modeLabel">Mode: -</div>
            <div class="status" id="statusText">Ready to start</div>
          </div>
          <div class="actions">
            <button id="btnNew" class="btn primary" type="button">New Game</button>
            <button id="btnBack" class="btn" type="button">Back</button>
          </div>
        </div>

        <!-- กระดาน 3x3 -->
        <div class="board" id="board" role="grid" aria-label="กระดาน XO 3x3">
          <!-- ช่องจะถูกสร้างด้วย JavaScript เพื่อให้โค้ดกระชับและแก้ไขง่าย -->
        </div>

        <footer class="footer">
          <small>
            Bot Mode: You are <strong>X</strong>, Bot is <strong>O</strong>
          </small>
        </footer>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
